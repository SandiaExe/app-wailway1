services:

  app:

    build: .

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:16

    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:

    image: redis:7

    ports:
      - "6379:6379"

volumes:

  postgres_data:
